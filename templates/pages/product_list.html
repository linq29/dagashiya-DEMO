{% extends "layout/base.html" %}

{% block content %}
<h2>商品一覧</h2>

<div id="productList">
  {% for product in products %}
    <div class="product">
      <h3>{{ product.pName }}</h3>
      <p>価格: {{ product.price|yen }}円</p>

      {% if product.image %}
        <img src="{{ url_for('static', filename='img/' ~ product.image) }}"
             width="150">
      {% endif %}
    </div>
  {% endfor %}
</div>
{% endblock %}
