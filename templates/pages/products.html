{% extends "layout/base.html" %}

{% block title %}商品管理 | デジタル昭和横丁{% endblock %}

{% block content %}

<div class="admin-container">

    <h1 class="admin-title">商品管理</h1>

    <div class="admin-actions">
        <a href="{{ url_for('add_product') }}" class="admin-add-btn">＋ 新規追加</a>
    </div>

    <table class="admin-table">
        <thead>
            <tr>
                <th>ID</th>
                <th>商品名</th>
                <th class="table-price">価格</th>
                <th>画像</th>
                <th>操作</th>
            </tr>
        </thead>

        <tbody>
        {% for p in products %}
            <tr>
                <td>{{ p.pID }}</td>

                <td>{{ p.pName }}</td>

                <td class="table-price">¥{{ p.price|yen }}</td>

                <td>
                    {% if p.image %}
                        <img src="{{ url_for('static', filename='img/products/' ~ p.image) }}"
                             class="admin-thumb">
                    {% else %}
                        <span class="no-image">画像なし</span>
                    {% endif %}
                </td>

                <td class="admin-buttons">
                    <a href="{{ url_for('edit_product', pID=p.pID) }}" class="admin-edit-btn">編集</a>

                    <form action="{{ url_for('delete_product', pID=p.pID) }}"
                          method="post" class="admin-delete-form"
                          onsubmit="return confirm('本当に削除しますか？');">
                        <button type="submit" class="admin-delete-btn">削除</button>
                    </form>
                </td>
            </tr>
        {% endfor %}
        </tbody>
    </table>

</div>

{% endblock %}
