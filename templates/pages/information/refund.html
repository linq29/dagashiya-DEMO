{% extends "layout/base.html" %}
{% block title %}返金・返品 | デジタル昭和横丁{% endblock %}

{% block content %}
<section class="page-section info-page">
    <div class="page-inner">

        <header class="page-heading">
            <h1 class="page-title">返金・返品</h1>
            <p class="page-lead">
                商品の返品・返金に関する方針についてご案内します。
            </p>
        </header>

        <div class="info-card">

            <h2 class="info-subtitle">返品・交換の条件</h2>
            <p class="info-text">
                原則として、商品到着後<strong>7日以内</strong>かつ
                <strong>未開封</strong>の商品に限り、返品・交換を承ります。
            </p>

            <hr class="info-divider">

            <h2 class="info-subtitle">返金について</h2>
            <p class="info-text">
                お客様より返送された商品を当店にて確認後、
                内容に問題がなければ返金処理を開始いたします。
                返金方法および反映までの期間は、ご利用の決済手段により異なります。
            </p>

        </div>
    </div>
</section>
{% endblock %}
